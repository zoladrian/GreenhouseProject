# Nginx: domyślny serwer na porcie 80 — przekierowanie captive na panel Greenhouse.
# ZAMIEŃ http://192.168.4.1:5000/ na rzeczywisty adres IP interfejsu AP + port API.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        return 302 http://192.168.4.1:5000/;
    }

    # Niektóre klienty proszą o /generate_204 — przekierowanie też wyzwoli wykrywanie captive
    location = /generate_204 {
        return 302 http://192.168.4.1:5000/;
    }
}
