# Fragment do dnsmasq (dopasuj IP — adres IP maliny w sieci hotspotu / AP, widoczny jako brama).
# Przykład: 192.168.4.1 (często przy NetworkManager „udostępnianie połączenia”).

# Google (Android)
address=/connectivitycheck.gstatic.com/192.168.4.1
address=/clients3.google.com/192.168.4.1

# Apple (iOS / macOS)
address=/captive.apple.com/192.168.4.1
address=/www.apple.com/192.168.4.1

# Microsoft (Windows / część urządzeń)
address=/www.msftconnecttest.com/192.168.4.1
address=/ipv6.msftconnecttest.com/192.168.4.1

# Firefox / inne
address=/detectportal.firefox.com/192.168.4.1
