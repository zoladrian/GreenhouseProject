name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Format check (whitespace) ────────────────────────────────────────────
      # Lekki gating na styl C# bez agresywnych reguł (sam whitespace).
      # Jeżeli ktoś wrzuci niezformatowany kod, CI zatrzyma PR-a z czytelnym
      # komunikatem zamiast „dziwnego" diffa w review.
      - name: dotnet format (whitespace verify)
        run: dotnet format whitespace Greenhouse.sln --verify-no-changes

      - name: Restore and test (.NET)
        run: dotnet test Greenhouse.sln --configuration Release

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Vitest (frontend)
        working-directory: frontend
        run: npm test

      # ── Playwright browsers cache ────────────────────────────────────────────
      # Pobranie chromiuma + libów to ok. 100 MB / 1-2 minuty.
      # Cache po wersji @playwright/test z lockfile (zmiana wersji ⇒ świeże
      # downloads, bez zatrutego cache'a).
      - name: Resolve Playwright version
        id: pw
        working-directory: frontend
        run: |
          VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        run: npx playwright install-deps chromium

      - name: Playwright (build + API + Chromium)
        working-directory: frontend
        run: npm run test:e2e

      # ── Failure artifacts ────────────────────────────────────────────────────
      # Bez tego nie mamy jak zdebugować flaky/CI-only failu — Playwright
      # zapisuje screen+trace w playwright-report/ i test-results/.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 14
