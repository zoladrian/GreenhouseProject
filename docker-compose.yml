services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    depends_on:
      - mosquitto
    ports:
      # Web UI / onboarding (z sieci LAN: http://<IP_malinki>:8080)
      - "8080:8080"
    volumes:
      - zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      # Lewa strona = urządzenie na hoście (ustaw w .env jako ZIGBEE_DEVICE — patrz .env.example).
      # Prawa strona = stała nazwa w kontenerze; w configuration.yaml Zigbee2MQTT: serial.port: /dev/ttyUSBZigbee
      - ${ZIGBEE_DEVICE:-/dev/ttyACM0}:/dev/ttyUSBZigbee
    environment:
      - TZ=Europe/Warsaw
      # Ważne: w kontenerze „localhost” to NIE broker Mosquitto — musi być nazwa serwisu compose.
      # Nadpisuje błędne mqtt://localhost z pierwszego startu / starej konfiguracji.
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      # Żeby w JSON stanu był obiekt device z ieee — aplikacja wtedy nie dublowe czujników po zmianie friendly name.
      - ZIGBEE2MQTT_CONFIG_MQTT_INCLUDE_DEVICE_INFORMATION=true
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=/dev/ttyUSBZigbee
      # Żeby UI było z sieci LAN (http://<IP>:8080) — onboarding często zapisuje frontend: false.
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
    restart: unless-stopped

  greenhouse-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dotnet", "Greenhouse.Api.dll"]
    working_dir: /app/api
    depends_on:
      - mosquitto
    ports:
      - "5000:5000"
    volumes:
      - greenhouse-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=Europe/Warsaw
      - Infrastructure__DatabasePath=/app/data/greenhouse.db
      - Mqtt__Enabled=true
      - Mqtt__Host=mosquitto
      - Mqtt__Port=1883
      - Mqtt__TopicFilter=zigbee2mqtt/#
      # Bez spamu SQL w logach (diagnoza zapytań: ustaw na Information)
      - Logging__LogLevel__Microsoft.EntityFrameworkCore=Warning
      - Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command=Warning
      # Opcjonalnie: Voice__GreetingLeadin=Dzień dobry Panie Janie
      - Voice__TimeZoneId=Europe/Warsaw
      # Opcjonalnie nadpisuje plik deploy-id z obrazu (zwykle nie ustawiaj — wtedy każdy build ma unikalny id i UI sam się odświeży).
      # - GREENHOUSE_DEPLOY_ID=recznie-ustawiona-etykieta
    restart: unless-stopped

volumes:
  mosquitto-data:
  zigbee2mqtt-data:
  greenhouse-data:
