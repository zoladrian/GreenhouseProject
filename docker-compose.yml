services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    depends_on:
      - mosquitto
    volumes:
      - zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      # Host: ścieżka do koordynatora; kontener: zgodnie z serial.port w configuration.yaml (np. /dev/ttyUSBZigbee)
      - ${ZIGBEE_DEVICE:-/dev/ttyUSBZigbee}:/dev/ttyUSBZigbee
    environment:
      - TZ=Europe/Warsaw
    restart: unless-stopped

  greenhouse-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dotnet", "Greenhouse.Api.dll"]
    working_dir: /app/api
    depends_on:
      - mosquitto
    ports:
      - "5000:5000"
    volumes:
      - greenhouse-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
      - Infrastructure__DatabasePath=/app/data/greenhouse.db
      - Mqtt__Enabled=true
      - Mqtt__Host=mosquitto
      - Mqtt__Port=1883
      - Mqtt__TopicFilter=zigbee2mqtt/#
    restart: unless-stopped

volumes:
  mosquitto-data:
  zigbee2mqtt-data:
  greenhouse-data:
